<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">

    <div class="login-card">
        <div class="text-center mb-4">
            <h1 class="fw-bold text-primary">📚 EduFlow</h1>
            <p class="text-muted small">Plan your success. Log in to continue.</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label small fw-bold">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-muted"></i></span>
                    <input type="text" id="username" class="form-control border-start-0 shadow-none" placeholder="Enter username" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
                    <input type="password" id="password" class="form-control border-start-0 shadow-none" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3 shadow-sm">Sign In</button>
            
            <div id="message" class="text-center small"></div>

            <div class="text-center mt-3">
                <small class="text-muted">New student? <a href="register.html" class="text-decoration-none">Create account</a></small>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
