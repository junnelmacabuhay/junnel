<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager - EduFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <h3>📚 EduFlow</h3>
      <ul>
        <li><a href="dashboard.html">📊 Dashboard</a></li>
        <li><a href="tasks.html" class="active">📋 Tasks</a></li>
        <li><a href="settings.html">⚙️ Settings</a></li>
        <li><a href="profile.html">👤 Profile</a></li>
      </ul>
      <button id="logoutBtn">📕 Logout</button>
    </aside>

    <main class="main-content">
      <div class="container-fluid">
        <header class="mb-4">
            <h2 class="fw-bold">Study Planner</h2>
            <p class="text-muted">Organize your schedule, set deadlines, and track your progress.</p>
        </header>

        <div class="row g-4">
          <div class="col-lg-4">
            <div class="card border-0 shadow-sm rounded-4 p-4 sticky-top" style="top: 2rem;">
              <h5 class="fw-bold mb-3"><i class="bi bi-plus-circle-fill text-primary me-2"></i>New Task</h5>
              <form id="taskForm">
                <div class="mb-3">
                  <label class="form-label small fw-bold">Task Title</label>
                  <input type="text" id="taskTitle" class="form-control shadow-none" placeholder="e.g. Math Quiz" required>
                </div>
                
                <div class="row mb-3">
                  <div class="col-6">
                    <label class="form-label small fw-bold">Date</label>
                    <input type="date" id="taskDate" class="form-control shadow-none" required>
                  </div>
                  <div class="col-6">
                    <label class="form-label small fw-bold">Time</label>
                    <input type="time" id="taskTime" class="form-control shadow-none" required>
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label small fw-bold">Attachment</label>
                  <input type="file" id="taskFile" class="form-control shadow-none border-dashed">
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold">Initial Status</label>
                    <select id="taskStatus" class="form-select shadow-none">
                      <option value="pending">🟡 Pending</option>
                      <option value="completed">🟢 Completed</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 rounded-3 shadow-sm">
                    Add to Schedule
                </button>
              </form>
            </div>
          </div>

          <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="card-header bg-white border-0 py-3 px-4 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0">Task Storage</h5>
                    <span class="badge bg-light text-primary rounded-pill px-3" id="taskCounter">0 Tasks</span>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr class="small text-muted text-uppercase fw-bold">
                                <th class="ps-4">Task & Date</th>
                                <th>Attachment</th>
                                <th>Status</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="taskList">
                            </tbody>
                    </table>
                </div>
                <div id="emptyState" class="text-center py-5">
                    <i class="bi bi-clipboard-x display-1 text-light"></i>
                    <p class="text-muted mt-2">No tasks saved yet. Start by adding one!</p>
                </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
