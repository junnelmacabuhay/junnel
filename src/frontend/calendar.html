<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do Calendar - EduFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <h3>📚 EduFlow</h3>
      <ul>
        <li><a href="dashboard.html">📊 Dashboard</a></li>
        <li><a href="calendar.html" class="active">📅 To-Do Calendar</a></li>
        <li><a href="tasks.html">📋 Tasks</a></li>
        <li><a href="settings.html">⚙️ Settings</a></li>
        <li><a href="profile.html">👤 Profile</a></li>
      </ul>
      <button id="logoutBtn">📕 Logout</button>
    </aside>

    <main class="main-content">
      <section class="section">
        <h2 class="mb-4">School Deadlines & To-Do</h2>
        
        <div class="row g-4">
          <div class="col-lg-12">
            <div class="card border-0 shadow-sm p-3">
              <div id="calendar"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal fade" id="eventModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="modalTitle">Add Task</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-bold small">Task Description</label>
            <input type="text" id="taskInput" class="form-control shadow-none" placeholder="e.g. Study for Exam">
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary px-4" id="saveTaskBtn">Save Task</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
