<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - EduFlow</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="styles.css">

</head>

<body class="login-page">

<div class="login-card">

<div class="text-center mb-4">
<h1 class="fw-bold text-primary">✨ Join EduFlow</h1>
<p class="text-muted small">Create your student account to get started.</p>
</div>

<form id="registerForm">

<!-- USERNAME -->
<div class="mb-3">

<label class="form-label small fw-bold">Username</label>

<div class="input-group">

<span class="input-group-text bg-white border-end-0">
<i class="bi bi-person text-muted"></i>
</span>

<input
type="text"
id="regUsername"
class="form-control border-start-0 shadow-none"
placeholder="johndoe123"
required
autocomplete="username"
>

</div>

</div>


<!-- EMAIL -->
<div class="mb-3">

<label class="form-label small fw-bold">Email Address</label>

<div class="input-group">

<span class="input-group-text bg-white border-end-0">
<i class="bi bi-envelope text-muted"></i>
</span>

<input
type="email"
id="regEmail"
class="form-control border-start-0 shadow-none"
placeholder="name@student.com"
required
autocomplete="email"
>

</div>

</div>


<!-- PASSWORD -->
<div class="mb-3">

<label class="form-label small fw-bold">Password</label>

<div class="input-group">

<span class="input-group-text bg-white border-end-0">
<i class="bi bi-lock text-muted"></i>
</span>

<input
type="password"
id="regPassword"
class="form-control border-start-0 shadow-none"
placeholder="••••••••"
required
autocomplete="new-password"
>

</div>

<div id="passwordHelp" class="form-text mt-2" style="font-size:0.75rem;">
Must be at least 8 characters long.
</div>

</div>


<!-- CONFIRM PASSWORD -->
<div class="mb-4">

<label class="form-label small fw-bold">Confirm Password</label>

<div class="input-group">

<span class="input-group-text bg-white border-end-0">
<i class="bi bi-lock-fill text-muted"></i>
</span>

<input
type="password"
id="regConfirmPassword"
class="form-control border-start-0 shadow-none"
placeholder="Re-enter password"
required
>

</div>

</div>


<!-- REGISTER BUTTON -->

<button
type="submit"
id="regBtn"
class="btn btn-primary w-100 fw-bold py-2 mb-3 shadow-sm"
>

Create Account

</button>


<!-- MESSAGE -->

<div id="regMessage" class="text-center small mb-3"></div>


<!-- LOGIN LINK -->

<div class="text-center mt-3">

<small class="text-muted">

Already a student?

<a href="login.html" class="text-decoration-none fw-bold text-primary">
Sign In
</a>

</small>

</div>

</form>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
