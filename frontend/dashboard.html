<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Study Planner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <h3>📚 EduFlow</h3>
      <ul>
        <li><a href="dashboard.html" class="active">📊 Dashboard</a></li>
        <li><a href="calendar.html">📅 To-Do Calendar</a></li>
        <li><a href="tasks.html">📋 Tasks</a></li>
        <li><a href="settings.html">⚙️ Settings</a></li>
        <li><a href="profile.html">👤 Profile</a></li>
      </ul>
      <button id="logoutBtn">📕 Logout</button>
    </aside>

    <main class="main-content">
      <section id="dashboard" class="section p-4">
        <header class="mb-4">
          <h2 class="fw-bold">Dashboard Overview</h2>
          <p class="text-muted">Track your academic momentum and task completion.</p>
        </header>

        <div id="tasks" class="row g-4 mb-4">
          <div class="col-md-4">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden stat-card bg-gradient-blue text-white">
              <div class="card-body p-4">
                <div class="d-flex justify-content-between">
                  <div>
                    <h6 class="text-uppercase small fw-bold opacity-75">Total Tasks</h6>
                    <h2 class="display-5 fw-bold mb-0" id="totalTasksCount">0</h2>
                  </div>
                  <div class="fs-1 opacity-25"><i class="bi bi-collection"></i></div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden stat-card bg-gradient-orange text-white">
              <div class="card-body p-4">
                <div class="d-flex justify-content-between">
                  <div>
                    <h6 class="text-uppercase small fw-bold opacity-75">Pending</h6>
                    <h2 class="display-5 fw-bold mb-0" id="pendingTasksCount">0</h2>
                  </div>
                  <div class="fs-1 opacity-25"><i class="bi bi-clock-history"></i></div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden stat-card bg-gradient-green text-white">
              <div class="card-body p-4">
                <div class="d-flex justify-content-between">
                  <div>
                    <h6 class="text-uppercase small fw-bold opacity-75">Completed</h6>
                    <h2 class="display-5 fw-bold mb-0" id="completedTasksCount">0</h2>
                  </div>
                  <div class="fs-1 opacity-25"><i class="bi bi-check2-circle"></i></div>
                </div>
              </div>
            </div>
          </div>
        </div>
        
        <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="h5 mb-0 fw-bold">Weekly Study Progress</h3>
            <span class="badge bg-primary-subtle text-primary rounded-pill px-3 py-2">Real-time Data</span>
          </div>
          <div style="height: 350px;">
            <canvas id="taskChart"></canvas>
          </div>
        </div>
      </section>
    </main>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
