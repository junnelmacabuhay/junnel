<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - EduFlow</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>

<body class="login-page">

<div class="login-card">

<div class="text-center mb-4">
<h1 class="fw-bold text-primary">📚 EduFlow</h1>
<p class="text-muted small">Plan your success. Log in to continue.</p>
</div>

<form id="loginForm">

<!-- EMAIL -->

<div class="mb-3">

<label class="form-label small fw-bold">Email</label>

<input
type="email"
id="email"
class="form-control"
placeholder="Enter your email"
required
>

</div>


<!-- PASSWORD -->

<div class="mb-4">

<label class="form-label small fw-bold">Password</label>

<input
type="password"
id="password"
class="form-control"
placeholder="Enter password"
required
>

</div>


<!-- LOGIN BUTTON -->

<button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-2">
Sign In
</button>


<!-- ERROR MESSAGE -->

<div id="message" class="text-danger text-center small"></div>


<!-- REGISTER LINK -->

<div class="text-center mt-3">

<small class="text-muted">
New student?
<a href="register.html" class="text-decoration-none">Create account</a>
</small>

</div>

</form>

</div>

<script src="script.js"></script>

</body>

</html>
